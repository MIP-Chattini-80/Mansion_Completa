server:
  port: 0

spring:
  flyway:
    enabled: 'true'
    baseline-on-migrate: 'true'
  datasource:
    username: root
    url: jdbc:mysql://localhost:3306/db_habitaciones?createDatabaseIfNotExist=true
    driverClassName: com.mysql.cj.jdbc.Driver
    password: ''
  application:
    name: habitaciones
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: 'true'

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /doc/swagger-ui/index.html